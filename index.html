              <p class="content-status">Loading content…</p>
            </section>

            <section
              id="home-experience"
              class="section"
              data-section
              aria-labelledby="home-experience-heading"
              aria-busy="true"
            >
              <p class="content-status">Loading content…</p>
            </section>

            <section id="home-projects" class="section" data-section aria-busy="true">
              <p class="content-status">Loading content…</p>
            </section>

            <section
              id="home-contact"
              class="section"
              data-section
              aria-labelledby="home-contact-heading"
            >
              <h2 class="section-heading" id="home-contact-heading">Contact</h2>
              <p class="section-sub">
                Send me a message directly. I usually reply within 1–2 days.
              </p>
              <form
                id="contact-form"
                class="contact-form"
                data-contact-endpoint="https://formsubmit.co/ajax/bebaslekhnath@gmail.com"
              >
                <div class="contact-field">
                  <label for="contact-name">Name</label>
                  <input id="contact-name" name="name" type="text" autocomplete="name" required />
                </div>
                <div class="contact-field">
                  <label for="contact-email">Email</label>
                  <input
                    id="contact-email"
                    name="email"
                    type="email"
                    autocomplete="email"
                    required
                  />
                </div>
                <div class="contact-field">
                  <label for="contact-message">Message</label>
                  <textarea
                    id="contact-message"
                    name="message"
                    rows="6"
                    maxlength="3000"
                    required
                  ></textarea>
                </div>
                <input type="text" name="_honey" tabindex="-1" autocomplete="off" hidden />
                <input type="hidden" name="_subject" value="New portfolio contact form message" />
                <button type="submit" class="contact-submit">Send message</button>
                <p class="contact-status" id="contact-status" role="status" aria-live="polite"></p>
              </form>
            </section>
          </div>

          <div id="route-experience" class="route route--dedicated" hidden>

              class="view-section"
              id="view-experience"
              aria-labelledby="view-experience-heading"
